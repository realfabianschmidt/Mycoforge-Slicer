# Mycoforge nozzle state and paste extrusion contract.
#
# Default nozzle is 5.0 mm because the active printer.cfg still uses the
# calibrated 5 mm virtual E model. Change it with SET_MYCO_NOZZLE after a
# mechanical nozzle swap.

[gcode_macro MYCO_STATE]
description: Central Mycoforge hardware state for Moonraker and slicer sync
variable_nozzle_diameter: 5.0
variable_allowed_nozzles: "2,3,4,5,6,8"
variable_filament_diameter: 5.0
variable_pcp_calibration_factor: 1.0
variable_piston_calibration_factor: 1.0
variable_last_slicer_nozzle: 0.0
variable_max_cross_section_mm2: 80.0
gcode:
    GET_MYCO_NOZZLE

[delayed_gcode MYCO_STATE_INIT]
initial_duration: 1
gcode:
    {% set saved_nozzle = printer.save_variables.variables.myco_nozzle_diameter|default(5.0)|float %}
    SET_GCODE_VARIABLE MACRO=MYCO_STATE VARIABLE=nozzle_diameter VALUE={saved_nozzle}
    RESPOND MSG="MYCO_NOZZLE DIAMETER={saved_nozzle}"

[gcode_macro SET_MYCO_NOZZLE]
description: Store the physically mounted Mycoforge nozzle diameter
gcode:
    {% if params.DIAMETER is not defined %}
        {action_raise_error("SET_MYCO_NOZZLE requires DIAMETER=<mm>.")}
    {% endif %}
    {% set requested = params.DIAMETER|float %}
    {% set allowed = printer["gcode_macro MYCO_STATE"].allowed_nozzles|string %}
    {% set ns = namespace(valid=false) %}
    {% for item in allowed.split(",") %}
        {% if (requested - item|float)|abs < 0.001 %}
            {% set ns.valid = true %}
        {% endif %}
    {% endfor %}
    {% if not ns.valid %}
        {action_raise_error("Invalid Mycoforge nozzle %.3f mm. Allowed: %s" % (requested, allowed))}
    {% endif %}
    SET_GCODE_VARIABLE MACRO=MYCO_STATE VARIABLE=nozzle_diameter VALUE={requested}
    SAVE_VARIABLE VARIABLE=myco_nozzle_diameter VALUE={requested}
    RESPOND MSG="MYCO_NOZZLE DIAMETER={requested}"

[gcode_macro GET_MYCO_NOZZLE]
description: Report the currently stored Mycoforge nozzle diameter
gcode:
    {% set nozzle = printer["gcode_macro MYCO_STATE"].nozzle_diameter|float %}
    RESPOND MSG="MYCO_NOZZLE DIAMETER={nozzle}"

[gcode_macro APPLY_MYCO_EXTRUSION_CONFIG]
description: Apply paste rotation-distance config without using nozzle diameter
gcode:
    {% set state = printer["gcode_macro MYCO_STATE"] %}
    {% set filament_diameter = state.filament_diameter|float %}
    {% set pcp_calibration = state.pcp_calibration_factor|float %}
    {% set piston_calibration = state.piston_calibration_factor|float %}
    {% set pi = 3.141592653589793 %}
    {% set a_fil = pi * (filament_diameter / 2.0) * (filament_diameter / 2.0) %}

    # PCP: 7200 mm^3 per rotor revolution, 10:1 gearbox, no Klipper gear_ratio.
    {% set chambers = 8.0 %}
    {% set eccentricity = 3.0 %}
    {% set rotor_radius = 6.0 %}
    {% set pitch = 50.0 %}
    {% set gear_ratio = 10.0 %}
    {% set v_pcp_rotor = chambers * eccentricity * rotor_radius * pitch %}
    {% set v_pcp_motor = v_pcp_rotor / gear_ratio %}
    {% set pcp_rd = (v_pcp_motor / a_fil) * pcp_calibration %}

    # Piston queue-sync value for the disabled extruder_stepper migration path.
    {% set cartridge_id = 104.0 %}
    {% set screw_lead = 5.0 %}
    {% set a_cart = pi * (cartridge_id / 2.0) * (cartridge_id / 2.0) %}
    {% set v_piston = a_cart * screw_lead %}
    {% set piston_rd = (v_piston / a_fil) * piston_calibration %}

    SET_EXTRUDER_ROTATION_DISTANCE EXTRUDER=extruder DISTANCE={pcp_rd}
    SET_GCODE_VARIABLE MACRO=_PRINT_SETTINGS VARIABLE=e_a VALUE={a_fil}
    SET_GCODE_VARIABLE MACRO=_PRIME_SETTINGS VARIABLE=e_a VALUE={a_fil}
    RESPOND MSG="MYCO_EXTRUSION_CONFIG PCP_RD={pcp_rd|round(4)} PISTON_RD_QUEUE_SYNC={piston_rd|round(4)} FILAMENT={filament_diameter}"
